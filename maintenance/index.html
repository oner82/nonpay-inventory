<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시스템 점검 중</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 20px;
      background: #f5f7fb; color: #122033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(440px, 100%); background: #fff; border: 1px solid #dbe7f5;
      border-radius: 18px; padding: 28px 24px; text-align: center;
      box-shadow: 0 12px 32px rgba(22, 39, 74, .08);
    }
    h1 { margin: 0 0 10px; font-size: 22px; letter-spacing: -.02em; }
    p { margin: 0 0 8px; color: #667085; font-weight: 700; line-height: 1.55; }
    .badge {
      display: inline-flex; align-items: center; min-height: 26px; padding: 0 12px;
      margin-bottom: 14px; border-radius: 999px; background: #fff7ed; color: #c2410c;
      font-size: 13px; font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">일시 중단</div>
    <h1>시스템 점검 중입니다</h1>
    <p>수술실 비급여·재고관리 시스템이 점검을 위해 잠시 중단되었습니다.</p>
    <p><strong>점검 기간 동안은 수기로 기록해 주세요.</strong><br>재개되면 다시 안내드리겠습니다.</p>
  </main>
</body>
</html>
