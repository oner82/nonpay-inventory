<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>비급여·랜딩 재료 관리 V1</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--accent:#2563eb;--danger:#dc2626;--ok:#16a34a;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink)}header{position:sticky;top:0;background:#111827;color:#fff;padding:14px 16px;z-index:5}h1{font-size:18px;margin:0}.status{font-size:12px;color:#d1d5db;margin-top:4px}nav{display:flex;gap:8px;overflow:auto;padding:10px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:58px;z-index:4}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;white-space:nowrap}.tab.active{background:var(--accent);color:#fff}.wrap{padding:14px;max-width:1200px;margin:auto}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 3px 10px #00000008}h2{font-size:18px;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}label{font-size:13px;color:var(--muted)}input,select,button,textarea{width:100%;font-size:15px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}button{cursor:pointer;font-weight:700}.primary{background:var(--accent);color:#fff;border:0}.danger{background:var(--danger);color:#fff;border:0}.ghost{background:#f3f4f6}.row{display:flex;gap:8px;align-items:center}.pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:8px 10px;margin:4px;background:#fff}.pill input{width:auto}.muted{color:var(--muted);font-size:13px}.warn{color:var(--danger);font-weight:700}.ok{color:var(--ok);font-weight:700}table{width:100%;border-collapse:collapse;background:#fff}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:14px}th{background:#f9fafb}.hidden{display:none}.received{background:#dcfce7!important}.pending{background:#fff7ed}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.box{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:12px}.box b{font-size:20px}details{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px}.toast{position:fixed;right:14px;bottom:14px;background:#111827;color:#fff;padding:12px 14px;border-radius:12px;display:none;max-width:80%;z-index:9}.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.big-btn{min-height:120px;font-size:28px;font-weight:800;border-radius:20px}.step-head{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.step-dot{padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-size:13px;background:#f9fafb}.step-dot.active{background:var(--accent);color:#fff;border-color:var(--accent)}.recommend-card{background:#eff6ff;border:2px solid #93c5fd;border-radius:14px;padding:12px;margin-bottom:10px}.product-btn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.product-btn{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.patient-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}.patient-card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}.patient-card h3{margin:0 0 6px;font-size:20px}.mobile-tab .tab{font-size:18px;padding:14px 18px}@media(max-width:700px){nav{top:58px}.tab{font-size:17px;padding:14px 16px}.row{flex-direction:column;align-items:stretch}table{font-size:12px}.wrap{padding:10px}.big-btn{min-height:100px;font-size:24px}}
</style>
</head>
<body>
<header><h1>비급여·DBM·ANCHOR 재고관리 V1</h1><div id="syncStatus" class="status">Firebase 연결 준비 중...</div></header>
<nav id="tabs"></nav>
<main class="wrap"><section id="screen"></section></main>
<div id="toast" class="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVppr1gp5X-9DDGYjng_7S83-7JxZuLV8",
  authDomain: "nonpay-inventory.firebaseapp.com",
  projectId: "nonpay-inventory",
  storageBucket: "nonpay-inventory.firebasestorage.app",
  messagingSenderId: "237037305787",
  appId: "1:237037305787:web:adcb53f4c86df7c0130e9e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const remoteRef = doc(db, "app", "main");
const LS='nonpay_inventory_v1_firebase';
const tabs=['대시보드','사용입력','당일현황','입고관리','랜딩입고체크','선호비급여','통계','제품설정','백업'];
const seed={products:[
{id:'NP001',cat:'비급여',vendor:'비급여',name:'Tendoregen',type:'구매',stock:10,proper:10,warn:3,alert:true,active:true},
{id:'NP002',cat:'비급여',vendor:'비급여',name:'Floseal',type:'구매',stock:8,proper:8,warn:2,alert:true,active:true},
{id:'NP003',cat:'비급여',vendor:'비급여',name:'Mediclore',type:'구매',stock:6,proper:6,warn:2,alert:true,active:true},
{id:'DBM001',cat:'DBM',vendor:'Orthoblast',name:'DBM 1cc',type:'랜딩',stock:5,landing:5,warn:1,alert:true,active:true},
{id:'DBM002',cat:'DBM',vendor:'Orthoblast',name:'DBM 3cc',type:'랜딩',stock:5,landing:5,warn:1,alert:true,active:true},
{id:'DBM003',cat:'DBM',vendor:'BoneGrow',name:'DBM 5cc',type:'랜딩',stock:4,landing:4,warn:1,alert:true,active:true},
{id:'AN001',cat:'ANCHOR',kind:'Suture Anchor',vendor:'Depuy',name:'Healix Advance',type:'랜딩',stock:6,landing:6,warn:2,alert:true,active:true},
{id:'AN002',cat:'ANCHOR',kind:'Knotless',vendor:'Arthrex',name:'SwiveLock',type:'랜딩',stock:6,landing:6,warn:2,alert:true,active:true},
{id:'AN003',cat:'ANCHOR',kind:'Small Joint',vendor:'Zimmer',name:'JuggerKnot',type:'랜딩',stock:5,landing:5,warn:1,alert:true,active:true}
],doctors:['김원장','박원장','이원장'],surgeries:['RCR','Spine fusion','ACL reconstruction','Hallux','Fracture fixation'],prefs:[{doctor:'김원장',surgery:'RCR',items:['NP001','NP002']},{doctor:'박원장',surgery:'Spine fusion',items:['NP003']}],uses:[],inbounds:[],landingChecks:[],logs:[]};
let state=loadLocal(), current='대시보드', ready=false;
function loadLocal(){try{return JSON.parse(localStorage.getItem(LS))||structuredClone(seed)}catch(e){return structuredClone(seed)}}
function setStatus(t){document.getElementById('syncStatus').textContent=t}
async function loadRemote(){try{const snap=await getDoc(remoteRef);if(snap.exists()){state=snap.data().state||state;localStorage.setItem(LS,JSON.stringify(state));setStatus('Firebase 연결됨 · 공용 데이터 불러옴')}else{await setDoc(remoteRef,{state,updatedAt:new Date().toISOString()});setStatus('Firebase 연결됨 · 초기 데이터 생성됨')}ready=true;render()}catch(e){console.error(e);setStatus('Firebase 연결 실패 · 현재 기기 저장으로 작동')}}
async function save(){localStorage.setItem(LS,JSON.stringify(state));try{await setDoc(remoteRef,{state,updatedAt:new Date().toISOString()});setStatus('Firebase 저장 완료 '+new Date().toLocaleTimeString('ko-KR'))}catch(e){console.error(e);setStatus('Firebase 저장 실패 · 현재 기기만 저장됨')}checkWarns()}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){return new Date().toISOString().slice(0,10)}
function toast(t){const x=document.getElementById('toast');x.textContent=t;x.style.display='block';setTimeout(()=>x.style.display='none',2300)}
function p(id){return state.products.find(x=>x.id===id)}
function activeProducts(cat){return state.products.filter(x=>x.active!==false&&(!cat||x.cat===cat))}
function render(){document.getElementById('tabs').className='mobile-tab';document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${t===current?'active':''}" onclick="go('${t}')">${t}</button>`).join('');const s=document.getElementById('screen');s.innerHTML='';({대시보드:screenDashboard,사용입력:screenUse,당일현황:screenToday,입고관리:screenInbound,랜딩입고체크:screenLanding,선호비급여:screenPrefs,통계:screenStats,제품설정:screenProducts,백업:screenBackup}[current]||screenDashboard)(s)}
window.go=(t)=>{current=t;render()}
function screenDashboard(s){s.innerHTML=`<div class="card"><h2>빠른 대시보드</h2><div class="dashboard-grid"><button class="primary big-btn" onclick="go('사용입력')">사용 입력</button><button class="big-btn" onclick="go('당일현황')">당일 현황</button><button class="big-btn" onclick="go('입고관리')">입고 관리</button><button class="big-btn" onclick="go('통계')">통계</button></div></div>`}
function productPicker(cat,title){const items=activeProducts(cat);if(cat==='비급여'){return `<div class="card"><h2>${title}</h2><div id="recArea"></div><details><summary>전체 비급여 펼치기</summary>${items.map(item=>pill(item)).join('')}</details></div>`} if(cat==='ANCHOR'){const kinds=[...new Set(items.map(x=>x.kind||'기타'))];return `<div class="card"><h2>${title}</h2>${kinds.map(k=>`<details open><summary>${k}</summary>${items.filter(x=>(x.kind||'기타')===k).map(item=>pill(item)).join('')}</details>`).join('')}</div>`}return `<div class="card"><h2>${title}</h2>${items.map(item=>pill(item)).join('')}</div>`}
function pill(item){return `<label class="pill"><input type="checkbox" class="useItem" value="${item.id}" onchange="toggleQty(this)"><span>${item.vendor} · ${item.name}</span><input class="qty hidden" data-for="${item.id}" type="number" min="1" value="1" style="width:70px"></label>`}
window.toggleQty=(chk)=>document.querySelector(`[data-for='${chk.value}']`).classList.toggle('hidden',!chk.checked)
function screenUse(s){s.innerHTML=`<div class="card"><h2>수술 사용 입력 (단계형)</h2><div class="step-head"><span class="step-dot active">1단계 기본정보</span><span class="step-dot">2단계 추천 비급여</span><span class="step-dot">3단계 DBM</span><span class="step-dot">4단계 ANCHOR</span><span class="step-dot">저장</span></div><div id="step1" class="card"><h2>1단계 · 기본정보</h2><div class="grid"><div><label>날짜</label><input id="uDate" type="date" value="${today()}"></div><div><label>원장님</label><select id="uDoctor" onchange="updateRecs()">${state.doctors.map(x=>`<option>${x}</option>`).join('')}</select></div><div><label>환자명</label><input id="uPatient" placeholder="예: 홍OO"></div><div><label>수술 종류</label><select id="uSurgery" onchange="updateRecs()">${state.surgeries.map(x=>`<option>${x}</option>`).join('')}</select></div><div><label>비급여 제한</label><select id="uLimit"><option value="false">아니오</option><option value="true">예</option></select></div></div><br><button class="primary" onclick="showStep(2)">다음: 추천 비급여</button></div><div id="step2" class="card hidden"><h2>2단계 · 추천 비급여</h2><div id="recArea"></div><details><summary>전체 비급여 펼치기</summary>${activeProducts('비급여').map(item=>pill(item)).join('')}</details><div class="row" style="margin-top:10px"><button onclick="showStep(1)">이전</button><button class="primary" onclick="showStep(3)">다음: DBM</button></div></div><div id="step3" class="card hidden"><h2>3단계 · DBM</h2><div class="product-btn-grid">${activeProducts('DBM').map(item=>`<div class="product-btn">${pill(item)}</div>`).join('')}</div><div class="row" style="margin-top:10px"><button onclick="showStep(2)">이전</button><button class="primary" onclick="showStep(4)">다음: ANCHOR</button></div></div><div id="step4" class="card hidden"><h2>4단계 · ANCHOR</h2><div class="product-btn-grid">${activeProducts('ANCHOR').map(item=>`<div class="product-btn">${pill(item)}</div>`).join('')}</div><div class="row" style="margin-top:10px"><button onclick="showStep(3)">이전</button><button class="primary" onclick="showStep(5)">다음: 저장</button></div></div><div id="step5" class="card hidden"><h2>마지막 단계 · 저장</h2><div class="row"><button onclick="showStep(4)">이전</button><button class="primary" onclick="saveUse()">저장</button><button class="ghost" onclick="render()">초기화</button></div></div></div>`;updateRecs()}
window.showStep=(n)=>{[1,2,3,4,5].forEach(i=>document.getElementById('step'+i)?.classList.toggle('hidden',i!==n));window.scrollTo({top:0,behavior:'smooth'})}
window.updateRecs=()=>{const d=document.getElementById('uDoctor')?.value, surg=document.getElementById('uSurgery')?.value, area=document.getElementById('recArea');if(!area)return;const pref=state.prefs.find(x=>x.doctor===d&&x.surgery===surg);const ids=pref?pref.items:[];area.innerHTML=ids.length?`<div class="recommend-card"><div><b>추천 비급여</b></div>${ids.map(x=>p(x)).filter(Boolean).map(item=>pill(item)).join('')}</div>`:`<div class="muted">저장된 추천 비급여가 없습니다.</div>`}
function selectedItems(){return [...document.querySelectorAll('.useItem:checked')].map(ch=>({productId:ch.value,qty:Number(document.querySelector(`[data-for='${ch.value}']`)?.value||1)}))}
window.saveUse=async()=>{const patient=document.getElementById('uPatient').value.trim();if(!patient)return alert('환자명을 입력하세요.');const doctor=uDoctor.value,surgery=uSurgery.value,date=uDate.value,limit=uLimit.value==='true';const items=selectedItems();const pref=state.prefs.find(x=>x.doctor===doctor&&x.surgery===surgery);const recIds=pref?pref.items:[];const selectedIds=items.map(x=>x.productId);if(recIds.length&&!recIds.some(x=>selectedIds.includes(x))&&!confirm('추천 비급여가 선택되지 않았습니다. 비급여를 사용하지 않은 것이 맞습니까?'))return;if(limit&&items.some(x=>p(x)?.cat==='비급여')&&!confirm('비급여 제한 환자입니다. 그래도 사용 입력하시겠습니까?'))return;items.forEach(x=>{const pr=p(x.productId);pr.stock=Number(pr.stock||0)-Number(x.qty||0)});state.uses.push({id:id(),date,doctor,patient,surgery,limit,items,createdAt:new Date().toISOString()});state.logs.push({at:new Date().toISOString(),type:'사용저장',text:`${patient} ${items.length}개 항목 저장`});await save();toast('저장했습니다.');current='당일현황';render()}
function itemsText(items){return items.map(x=>{const pr=p(x.productId);return `${pr?.cat||''}/${pr?.name||x.productId} ${x.qty}`}).join(', ')||'-'}
function screenToday(s){const d=today();const rows=state.uses.filter(x=>x.date===d);s.innerHTML=`<div class="card"><h2>당일 현황 ${d}</h2><button onclick="loadRemote()">Firebase 새로고침</button><div class="patient-cards">${rows.map(x=>`<div class="patient-card"><h3>${x.patient}</h3><div><b>원장:</b> ${x.doctor}</div><div><b>수술:</b> ${x.surgery}</div><div><b>비급여 제한:</b> ${x.limit?'예':'아니오'}</div><div style="margin-top:6px"><b>사용내역:</b><br>${itemsText(x.items)}</div><div style="margin-top:10px"><button onclick="editUse('${x.id}')">수정</button></div></div>`).join('')||'<div class="muted">오늘 입력 없음</div>'}</div></div><div class="card"><h2>재고 경고</h2>${warnList()}</div>`}
window.editUse=async(uid)=>{const u=state.uses.find(x=>x.id===uid);const txt=prompt('수정 메모를 입력하세요. 실제 수량 수정은 제품설정/입고에서 보정하세요.',itemsText(u.items));if(txt!==null){state.logs.push({at:new Date().toISOString(),type:'수정메모',text:`${u.patient}: ${txt}`});await save();toast('수정 메모 저장')}}
function screenInbound(s){s.innerHTML=`<div class="card"><h2>구매제품 입고</h2><div class="grid"><div><label>날짜</label><input id="inDate" type="date" value="${today()}"></div><div><label>제품</label><select id="inProd">${activeProducts().filter(x=>x.type==='구매').map(x=>`<option value="${x.id}">${x.cat} · ${x.vendor} · ${x.name} / 현재 ${x.stock}</option>`).join('')}</select></div><div><label>입고 수량</label><input id="inQty" type="number" min="1" value="1"></div></div><br><button class="primary" onclick="saveInbound()">입고 저장</button></div><div class="card"><h2>입고 이력</h2>${tableInbound()}</div>`}
window.saveInbound=async()=>{const pr=p(inProd.value),q=Number(inQty.value||0);if(!q)return;pr.stock=Number(pr.stock||0)+q;state.inbounds.push({id:id(),date:inDate.value,productId:pr.id,qty:q,at:new Date().toISOString()});state.logs.push({at:new Date().toISOString(),type:'구매입고',text:`${pr.name} +${q}`});await save();toast('입고 저장');render()}
function tableInbound(){return `<table><thead><tr><th>날짜</th><th>제품</th><th>수량</th></tr></thead><tbody>${state.inbounds.slice().reverse().map(x=>`<tr><td>${x.date}</td><td>${p(x.productId)?.name||x.productId}</td><td>+${x.qty}</td></tr>`).join('')||'<tr><td colspan="3">이력 없음</td></tr>'}</tbody></table>`}
function weekDates(){let d=new Date();let day=d.getDay()||7;d.setDate(d.getDate()-day+1);return Array.from({length:7},(_,i)=>{let x=new Date(d);x.setDate(d.getDate()+i);return x.toISOString().slice(0,10)})}
function screenLanding(s){const ds=weekDates();const cats=['DBM','ANCHOR'];s.innerHTML=`<div class="card"><h2>랜딩 입고 체크</h2><div class="muted">받은 제품을 클릭하면 색이 칠해지고 기록이 남습니다.</div>${cats.map(cat=>`<h3>${cat}</h3><table><thead><tr><th>제품</th>${ds.map(d=>`<th>${d.slice(5)}</th>`).join('')}</tr></thead><tbody>${activeProducts(cat).filter(x=>x.type==='랜딩').map(pr=>`<tr><td>${pr.vendor} · ${pr.name}</td>${ds.map(d=>cellLanding(pr.id,d)).join('')}</tr>`).join('')}</tbody></table>`).join('')}</div>`}
function cellLanding(pid,d){const hit=state.landingChecks.find(x=>x.productId===pid&&x.date===d);return `<td><button class="${hit?'received':'pending'}" onclick="toggleLanding('${pid}','${d}')">${hit?'수령':'예정'}</button></td>`}
window.toggleLanding=async(pid,d)=>{const i=state.landingChecks.findIndex(x=>x.productId===pid&&x.date===d);if(i>=0){state.landingChecks.splice(i,1);state.logs.push({at:new Date().toISOString(),type:'랜딩체크취소',text:`${p(pid)?.name} ${d}`})}else{state.landingChecks.push({id:id(),date:d,productId:pid,at:new Date().toISOString()});state.logs.push({at:new Date().toISOString(),type:'랜딩수령',text:`${p(pid)?.name} ${d}`})}await save();render()}
function screenPrefs(s){s.innerHTML=`<div class="card"><h2>원장님별 수술종류별 추천 비급여</h2><div class="grid"><div><label>원장님</label><input id="pfDoctor" list="doctorList"></div><div><label>수술명</label><input id="pfSurgery" list="surgeryList"></div></div><datalist id="doctorList">${state.doctors.map(x=>`<option>${x}</option>`).join('')}</datalist><datalist id="surgeryList">${state.surgeries.map(x=>`<option>${x}</option>`).join('')}</datalist><div style="margin-top:10px">${activeProducts('비급여').map(x=>`<label class="pill"><input class="pfItem" type="checkbox" value="${x.id}">${x.name}</label>`).join('')}</div><button class="primary" onclick="savePref()">추천 저장</button></div><div class="card"><h2>저장된 추천</h2><table><thead><tr><th>원장</th><th>수술</th><th>추천</th></tr></thead><tbody>${state.prefs.map(x=>`<tr><td>${x.doctor}</td><td>${x.surgery}</td><td>${x.items.map(i=>p(i)?.name).join(', ')}</td></tr>`).join('')}</tbody></table></div>`}
window.savePref=async()=>{const doctor=pfDoctor.value.trim(),surgery=pfSurgery.value.trim();const items=[...document.querySelectorAll('.pfItem:checked')].map(x=>x.value);if(!doctor||!surgery||!items.length)return alert('원장님, 수술명, 추천 비급여를 입력하세요.');if(!state.doctors.includes(doctor))state.doctors.push(doctor);if(!state.surgeries.includes(surgery))state.surgeries.push(surgery);const old=state.prefs.find(x=>x.doctor===doctor&&x.surgery===surgery);if(old)old.items=items;else state.prefs.push({doctor,surgery,items});await save();toast('추천 저장');render()}
function screenStats(s){s.innerHTML=`<div class="card"><h2>통계</h2><div class="grid"><div><label>시작</label><input id="stFrom" type="date" value="${today()}"></div><div><label>종료</label><input id="stTo" type="date" value="${today()}"></div></div><br><button class="primary" onclick="drawStats()">조회</button><button onclick="downloadCSV()">CSV 다운로드</button></div><div id="statsOut"></div>`;drawStats()}
function rangeUses(){const f=stFrom?.value||today(),t=stTo?.value||today();return state.uses.filter(x=>x.date>=f&&x.date<=t)}
window.drawStats=()=>{const out=document.getElementById('statsOut');if(!out)return;const rows=rangeUses();const by={patient:{},surgery:{},product:{}};rows.forEach(u=>{by.patient[u.patient]=(by.patient[u.patient]||0)+1;by.surgery[u.surgery]=(by.surgery[u.surgery]||0)+1;u.items.forEach(it=>{const pr=p(it.productId);const k=`${pr?.cat||''} ${pr?.name||it.productId}`;by.product[k]=(by.product[k]||0)+Number(it.qty||0)})});out.innerHTML=`<div class="summary"><div class="box">환자수<br><b>${Object.keys(by.patient).length}</b></div><div class="box">입력건수<br><b>${rows.length}</b></div><div class="box">제품종류<br><b>${Object.keys(by.product).length}</b></div></div>${statTable('환자별',by.patient)}${statTable('수술별',by.surgery)}${statTable('제품별',by.product)}`}
function statTable(title,obj){return `<div class="card"><h2>${title}</h2><table><tbody>${Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')||'<tr><td>자료 없음</td></tr>'}</tbody></table></div>`}
window.downloadCSV=()=>{const rows=[['날짜','환자','원장','수술','제품','수량']];rangeUses().forEach(u=>u.items.forEach(it=>rows.push([u.date,u.patient,u.doctor,u.surgery,p(it.productId)?.name||it.productId,it.qty])));const csv=rows.map(r=>r.map(x=>`"${String(x).replaceAll('"','""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='nonpay_stats.csv';a.click()}
function screenProducts(s){s.innerHTML=`<div class="card"><h2>제품 입력/수정</h2><div class="grid"><div><label>분류</label><select id="prCat"><option>비급여</option><option>DBM</option><option>ANCHOR</option></select></div><div><label>종류(ANCHOR)</label><input id="prKind"></div><div><label>업체</label><input id="prVendor"></div><div><label>제품명</label><input id="prName"></div><div><label>랜딩/구매</label><select id="prType"><option>구매</option><option>랜딩</option></select></div><div><label>현재고</label><input id="prStock" type="number" value="0"></div><div><label>적정/랜딩 수량</label><input id="prProper" type="number" value="0"></div><div><label>경고수량</label><input id="prWarn" type="number" value="0"></div><div><label>경고</label><select id="prAlert"><option value="true">켜기</option><option value="false">끄기</option></select></div></div><br><button class="primary" onclick="addProduct()">제품 추가</button></div><div class="card"><h2>제품 목록</h2><table><thead><tr><th>분류</th><th>업체</th><th>제품</th><th>방식</th><th>재고</th><th>경고</th></tr></thead><tbody>${state.products.map(x=>`<tr><td>${x.cat}</td><td>${x.vendor}</td><td>${x.name}</td><td>${x.type}</td><td>${x.stock}</td><td>${x.alert?'켜짐':'꺼짐'} / ${x.warn}</td></tr>`).join('')}</tbody></table></div>`}
window.addProduct=async()=>{if(!prName.value.trim())return alert('제품명을 입력하세요.');state.products.push({id:'P'+id(),cat:prCat.value,kind:prKind.value,vendor:prVendor.value||'-',name:prName.value.trim(),type:prType.value,stock:Number(prStock.value||0),proper:Number(prProper.value||0),landing:Number(prProper.value||0),warn:Number(prWarn.value||0),alert:prAlert.value==='true',active:true});await save();toast('제품 추가');render()}
function screenBackup(s){s.innerHTML=`<div class="card"><h2>백업/복원</h2><button class="primary" onclick="backup()">백업 JSON 다운로드</button><button onclick="loadRemote()">Firebase 새로고침</button><br><br><textarea id="restoreText" rows="8" placeholder="백업 JSON을 붙여넣고 복원"></textarea><button onclick="restore()">복원</button><button class="danger" onclick="resetAll()">초기화</button></div><div class="card"><h2>작업 로그</h2><table><tbody>${state.logs.slice().reverse().slice(0,50).map(x=>`<tr><td>${x.at}</td><td>${x.type}</td><td>${x.text}</td></tr>`).join('')||'<tr><td>로그 없음</td></tr>'}</tbody></table></div>`}
window.backup=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='nonpay_backup.json';a.click()}
window.restore=async()=>{try{state=JSON.parse(restoreText.value);await save();render();toast('복원 완료')}catch(e){alert('JSON 형식이 아닙니다.')}}
window.resetAll=async()=>{if(confirm('모든 데이터를 초기화할까요?')){state=structuredClone(seed);await save();render()}}
function warnList(){const arr=state.products.filter(x=>x.alert&&Number(x.stock||0)<=Number(x.warn||0));return arr.map(x=>`<div class="warn">${x.cat} · ${x.name}: 현재 ${x.stock} / 경고 ${x.warn}</div>`).join('')||'<div class="ok">경고 제품 없음</div>'}
function checkWarns(){const arr=state.products.filter(x=>x.alert&&Number(x.stock||0)<=Number(x.warn||0));if(arr.length)console.warn('재고 경고',arr)}
window.loadRemote=loadRemote;
render();
loadRemote();
</script>
</body>
</html>
