<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>수술실 재고관리</title>
  <style>

    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #122033;
      --muted: #6b7a90;
      --line: #e1e8f2;
      --brand: #2f6fd6;
      --brand-dark: #1f4f99;
      --nav: #f8fbff;
      --nav-2: #eef4ff;
      --warn: #ffb05c;
      --danger: #ff6b6b;
      --ok: #23c483;
      --soft: #edf4ff;
      --shadow: 0 12px 32px rgba(22, 39, 74, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      border-bottom: 1px solid #dbe7f5;
      box-shadow: 0 10px 24px rgba(31, 79, 153, 0.10);
    }

    .topbar { padding: 12px 12px 8px; }

    .brand {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .brand-logo {
      display: block;
      justify-self: end;
      width: 120px;
      height: auto;
      border-radius: 10px;
      background: transparent;
      padding: 0;
      box-shadow: none;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.65));
    }

    .brand-title { min-width: 0; }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.22;
      color: #122033;
      letter-spacing: -0.04em;
      word-break: keep-all;
    }

    .brand-subtitle {
      margin-top: 3px;
      color: #5f6f86;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .01em;
    }

    #status {
      min-height: 22px;
      color: #5f6f86;
      font-size: 12px;
      font-weight: 800;
    }

    #status.ok { color: #1f7a4d; }
    #status.error { color: #c2410c; }

    #nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0 12px;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid #d7e2ef;
      border-radius: 10px;
      background: rgba(255,255,255,.72);
      color: #2e405c;
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
    }

    .tab.active {
      border-color: rgba(47,111,214,.25);
      background: linear-gradient(135deg, #3b82f6, #255ec4);
      color: #fff;
      box-shadow: 0 10px 24px rgba(30, 113, 216, .28);
    }

    main {
      max-width: 1420px;
      margin: 0 auto;
      padding: 18px 14px 48px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: -4px 0 18px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.88);
      box-shadow: var(--shadow);
    }

    .page-head h2 { margin: 0; font-size: 23px; letter-spacing: -0.04em; }

    .page-user { color: var(--muted); font-size: 13px; font-weight: 850; text-align: right; }
    .view { display: none; }
    .view.active { display: block; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card h2, .card h3 { margin: 0 0 14px; font-size: 18px; letter-spacing: -0.03em; }

    .stat {
      position: relative;
      min-height: 116px;
      padding: 22px 18px 18px 92px;
      display: grid;
      align-content: center;
      overflow: hidden;
    }

    .stat::before {
      content: attr(data-icon);
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #71ddd4, #35b7c6);
      color: #fff;
      font-size: 22px;
      font-weight: 950;
      box-shadow: 0 14px 26px rgba(47, 128, 237, .20);
    }
    .stat:nth-child(2)::before { background: linear-gradient(135deg, #5aa7ff, #2e7df3); }
    .stat:nth-child(3)::before { background: linear-gradient(135deg, #ffc46b, #ff9e42); }
    .stat:nth-child(4)::before { background: linear-gradient(135deg, #ff8b8b, #f05252); }
    .stat strong { display: block; font-size: 31px; line-height: 1.05; letter-spacing: -0.04em; }
    .stat span, .muted { color: var(--muted); font-size: 14px; }

    label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 14px; font-weight: 850; }
    input, select, textarea {
      width: 100%; min-height: 46px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
      background: #fff; color: var(--ink); font: inherit; outline: none;
      box-shadow: inset 0 1px 0 rgba(16, 35, 63, .02);
    }
    input:focus, select:focus, textarea:focus { border-color: #9bc6ff; box-shadow: 0 0 0 4px rgba(31, 122, 224, .10); }
    textarea { min-height: 170px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; }
    button {
      min-height: 46px; padding: 0 15px; border: 0; border-radius: 10px;
      background: linear-gradient(135deg, #2f8df4, #176bd2); color: #fff; font-size: 14px; font-weight: 900;
      cursor: pointer; box-shadow: 0 10px 20px rgba(24, 108, 210, .18);
    }
    button.secondary { border: 1px solid var(--line); background: #fff; color: var(--ink); box-shadow: none; }
    button.danger { background: var(--danger); }
    button.warn { background: var(--warn); }
    .row { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 12px; }

    .dashboard-shell { display: grid; gap: 16px; }
    .dashboard-content { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .dashboard-left, .dashboard-right { display: grid; gap: 16px; align-content: start; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .toolbar select, .toolbar input { width: auto; min-width: 160px; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    table.inventory-table { width: 100%; border-collapse: collapse; min-width: 760px; background: #fff; }
    .inventory-table th, .inventory-table td { padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 13px; text-align: left; white-space: nowrap; }
    .inventory-table th { color: #53647a; background: #f8fbff; font-weight: 900; }
    .inventory-table tr:last-child td { border-bottom: 0; }
    .code-link { color: #1976dc; font-weight: 900; }
    .status-chip { display: inline-flex; align-items: center; min-height: 26px; padding: 0 10px; border-radius: 8px; font-size: 12px; font-weight: 950; background: #e9fbf1; color: #18a66a; }
    .status-chip.low { background: #ffe9e9; color: #ef4444; }

    .donut-card { display: grid; grid-template-columns: 170px 1fr; gap: 16px; align-items: center; }
    .donut {
      width: 168px; height: 168px; border-radius: 50%;
      background: conic-gradient(#5b7fff 0 40%, #60a5fa 40% 63%, #5ee0c2 63% 80%, #ffc067 80% 92%, #ff8484 92% 100%);
      position: relative; margin: 0 auto;
    }
    .donut::after { content: attr(data-total); position: absolute; inset: 36px; border-radius: 50%; background: #fff; display: grid; place-items: center; text-align: center; color: var(--ink); font-size: 24px; font-weight: 950; white-space: pre-line; box-shadow: inset 0 0 0 1px var(--line); }
    .legend { display: grid; gap: 10px; }
    .legend-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: #53647a; font-size: 13px; font-weight: 850; }
    .legend-row::before { content: ""; width: 10px; height: 10px; border-radius: 50%; background: #5b7fff; flex: 0 0 auto; }
    .legend-row:nth-child(2)::before { background: #60a5fa; }
    .legend-row:nth-child(3)::before { background: #5ee0c2; }
    .legend-row:nth-child(4)::before { background: #ffc067; }
    .legend-row:nth-child(5)::before { background: #ff8484; }

    .quick-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .quick-btn { min-height: 86px; border: 1px solid var(--line); border-radius: 12px; background: #fff; color: var(--ink); box-shadow: none; display: grid; place-items: center; gap: 6px; }
    .quick-icon { color: var(--brand); font-size: 26px; line-height: 1; }

    .settings-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
    .settings-tab { flex: 0 0 auto; min-height: 42px; border: 1px solid var(--line); background: #fff; color: var(--ink); }
    .settings-tab.active { border-color: var(--brand); background: var(--brand); color: #fff; }

    .receipt-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
    .receipt-tab { flex: 0 0 auto; min-height: 42px; border: 1px solid var(--line); background: #fff; color: var(--ink); box-shadow: none; }
    .receipt-tab.active { border-color: var(--brand); background: var(--brand); color: #fff; }
    .receipt-wide { width: 100%; }
    .compact-line { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: nowrap; }
    .compact-main { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 900; }
    .compact-meta { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; font-weight: 800; white-space: nowrap; }
    .compact-actions { flex: 0 0 auto; display: flex; gap: 6px; align-items: center; }
    .compact-actions button { min-height: 34px; padding: 0 10px; font-size: 13px; border-radius: 8px; }
    .landing-line { padding: 10px 12px; }
    .item { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; box-shadow: 0 6px 15px rgba(16,35,63,.04); }
    .item + .item { margin-top: 10px; }
    details.item { padding: 0; overflow: hidden; }
    details.item > summary { display: flex; justify-content: space-between; gap: 10px; align-items: center; min-height: 52px; padding: 12px; font-weight: 900; cursor: pointer; list-style: none; }
    details.item > summary::-webkit-details-marker { display: none; }
    details.item > summary::after { content: "펼치기"; color: var(--brand-dark); font-size: 13px; font-weight: 900; }
    details.item[open] > summary::after { content: "접기"; }
    .details-body { padding: 0 12px 12px; }
    .landing-line { border-left: 5px solid #facc15; }
    .landing-line.received { border-left-color: #22c55e; background: #f0fdf4; }
    .landing-line.pending { background: #fffbeb; }
    .landing-simple { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .item-title { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 8px; font-weight: 900; }
    .pill { display: inline-flex; align-items: center; min-height: 26px; padding: 0 9px; border-radius: 999px; background: var(--soft); color: var(--brand-dark); font-size: 12px; font-weight: 900; white-space: nowrap; }
    .pill.low { background: #fff1f2; color: var(--danger); }
    .meta { display: grid; gap: 4px; color: var(--muted); font-size: 14px; }
    .usage-products { display: grid; gap: 8px; margin-top: 8px; }
    .usage-product-group { display: grid; gap: 7px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: #f8fafc; }
    .usage-product-group.nonpay { border-color: #fb923c; background: #fff7ed; }
    .usage-product-group.tissue { border-color: #93c5fd; background: #eff6ff; }
    .usage-product-group.anchor { border-color: #86efac; background: #f0fdf4; }
    .usage-product-heading { display: flex; justify-content: space-between; gap: 8px; align-items: center; color: var(--ink); font-size: 14px; font-weight: 900; }
    .usage-product-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .usage-chip { display: inline-flex; align-items: center; min-height: 30px; padding: 5px 8px; border: 1px solid rgba(15,23,42,.08); border-radius: 10px; background: rgba(255,255,255,.78); color: var(--ink); font-size: 13px; font-weight: 800; }
    .summary-table { display: grid; gap: 6px; }
    .summary-row { display: grid; grid-template-columns: 1fr; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    details.summary-row { padding: 0; overflow: hidden; }
    details.summary-row > summary { display: grid; grid-template-columns: minmax(180px, 1fr) auto; gap: 10px; align-items: center; min-height: 46px; padding: 8px 12px; cursor: pointer; list-style: none; }
    details.summary-row > summary::-webkit-details-marker { display: none; }
    .summary-row.nonpay { border-color: #fb923c; background: #fff7ed; }
    .summary-headline { min-width: 0; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; }
    .summary-name { color: var(--ink); font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .summary-sub { color: var(--muted); font-size: 12px; font-weight: 800; flex: 0 0 auto; }
    .summary-metrics { display: grid; grid-template-columns: repeat(3, 86px); gap: 6px; align-items: center; }
    .metric { min-height: 30px; padding: 4px 8px; border-radius: 999px; background: rgba(255,255,255,.88); text-align: center; border: 1px solid rgba(15,23,42,.06); }
    .metric strong { display: inline; color: var(--ink); font-size: 15px; line-height: 1; margin-right: 4px; }
    .metric span { display: inline; color: var(--muted); font-size: 11px; font-weight: 900; }
    .metric.stock-ok { background: #ecfdf5; color: #047857; border-color: #bbf7d0; }
    .metric.stock-ok strong, .metric.stock-ok span { color: #047857; }
    .metric.stock-warn { background: #fffbeb; color: #b45309; border-color: #fde68a; }
    .metric.stock-warn strong, .metric.stock-warn span { color: #b45309; }
    .metric.stock-danger { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .metric.stock-danger strong, .metric.stock-danger span { color: #be123c; }
    .product-picker { display: grid; gap: 8px; margin-top: 8px; }
    .check-card { display: grid; grid-template-columns: 28px 1fr auto; gap: 8px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .check-card input { min-height: 24px; width: 24px; margin: 0; }
    .check-card.rule-card { grid-template-columns: 28px 1fr 82px; }
    .check-card.rule-card input[type="number"], .check-card.use-card input[type="number"] { width: 82px; min-height: 40px; padding: 8px; text-align: center; font-weight: 900; }
    .check-card.use-card { grid-template-columns: 28px 1fr 82px; }
    .toggle-line { display: flex; align-items: center; gap: 10px; min-height: 46px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fff; cursor: pointer; font-weight: 900; }
    .toggle-line input { width: 24px; min-height: 24px; margin: 0; flex: 0 0 auto; }
    .empty { padding: 16px; border: 1px dashed var(--line); border-radius: 10px; color: var(--muted); background: #fff; text-align: center; }


    @media (max-width: 720px) {
      .topbar { padding: 10px 10px 6px; }
      .brand { grid-template-columns: minmax(0, 1fr) 88px; gap: 8px; }
      .brand-logo { width: 88px; padding: 0; border-radius: 0; justify-self: end; }
      h1 { font-size: 15px; line-height: 1.2; }
      .brand-subtitle { font-size: 10px; }
      #status { min-height: 18px; margin-top: 6px; font-size: 11px; }
      #nav { gap: 6px; padding: 7px 0 8px; }
      .tab { min-height: 36px; padding: 0 11px; font-size: 13px; border-radius: 9px; }
      main { padding: 12px 8px 36px; }
      .page-head { margin-bottom: 10px; padding: 10px; min-height: 52px; }
      .page-head h2 { font-size: 18px; }
      details.summary-row > summary { grid-template-columns: 1fr; gap: 6px; }
      .summary-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .summary-headline { white-space: normal; }
      .summary-name { white-space: normal; }
    }

    @media (min-width: 720px) {
      h1 { font-size: 20px; }
      main { padding: 22px 20px 56px; }
      .grid.two { grid-template-columns: minmax(320px, .8fr) 1.2fr; align-items: start; }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .row.two { grid-template-columns: 1fr 1fr; }
      .row.three { grid-template-columns: 1fr 1fr 1fr; }
      .quick-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (min-width: 1100px) {
      body { padding-left: 260px; }
      header { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; border-right: 1px solid #dbe7f5; border-bottom: 0; }
      .topbar { display: grid; grid-template-rows: auto auto 1fr auto; height: 100%; padding: 22px 16px; }
      .brand { grid-template-columns: 1fr; gap: 12px; align-items: start; }
      .brand-logo { width: 88%; max-width: 205px; padding: 0; border-radius: 0; justify-self: end; }
      h1 { font-size: 18px; line-height: 1.28; }
      .brand-subtitle { font-size: 12px; color: #5f6f86; }
      #status { margin: 10px 0 22px; font-size: 12px; }
      #nav { display: grid; align-content: start; gap: 10px; overflow: visible; padding: 0; }
      .tab { justify-content: flex-start; width: 100%; min-height: 48px; text-align: left; padding: 0 16px; }
      main { max-width: none; padding: 0 28px 42px; }
      .page-head { position: sticky; top: 0; z-index: 8; margin: 0 -28px 24px; min-height: 78px; padding: 18px 28px; border-width: 0 0 1px; border-radius: 0; background: rgba(255,255,255,.95); box-shadow: 0 8px 24px rgba(22,39,74,.06); }
      .dashboard-content { grid-template-columns: minmax(0, 1.55fr) minmax(360px, .85fr); align-items: start; }
      .quick-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    }

  

    /* responsive header/sidebar fix */
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { min-width: 0; }
    header { width: 100%; }
    .topbar { width: 100%; max-width: 100%; }
    .brand { width: 100%; min-width: 0; }
    .brand-title { min-width: 0; }
    .brand-logo { flex-shrink: 0; object-fit: contain; }
    #nav { max-width: 100%; scrollbar-width: thin; }
    main { width: 100%; max-width: 100%; overflow-x: hidden; }
    .card, .page-head, .table-wrap { max-width: 100%; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    @media (max-width: 1099px) {
      body { padding-left: 0 !important; }
      header {
        position: sticky !important;
        left: auto !important;
        right: auto !important;
        top: 0 !important;
        bottom: auto !important;
        width: 100% !important;
        max-width: 100vw !important;
        border-right: 0 !important;
        border-bottom: 1px solid #dbe7f5 !important;
      }
      .topbar {
        display: block !important;
        height: auto !important;
        padding: 10px 12px 8px !important;
      }
      .brand {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) minmax(92px, 132px) !important;
        gap: 8px !important;
        align-items: center !important;
      }
      .brand-logo {
        width: clamp(92px, 30vw, 132px) !important;
        max-width: 100% !important;
        justify-self: end !important;
      }
      h1 { font-size: clamp(14px, 4.2vw, 18px) !important; white-space: normal !important; }
      .brand-subtitle { font-size: clamp(10px, 3vw, 12px) !important; }
      #status { margin-top: 8px !important; min-height: 18px !important; font-size: 12px !important; }
      #nav {
        display: flex !important;
        gap: 7px !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        flex-wrap: nowrap !important;
        width: 100% !important;
        padding: 8px 0 10px !important;
        -webkit-overflow-scrolling: touch !important;
      }
      .tab {
        flex: 0 0 auto !important;
        min-height: 40px !important;
        padding: 0 14px !important;
        font-size: 14px !important;
        white-space: nowrap !important;
      }
      main { padding: 14px 8px 40px !important; }
      .page-head { margin: 0 0 14px !important; padding: 14px 16px !important; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
      .stat { min-height: 96px !important; padding: 18px 14px 14px 76px !important; }
      .stat::before { left: 18px !important; width: 48px !important; height: 48px !important; }
      .toolbar { display: grid !important; grid-template-columns: 1fr 1fr; gap: 8px !important; }
      .toolbar select, .toolbar input, .toolbar button { width: 100% !important; min-width: 0 !important; }
    }

    @media (max-width: 520px) {
      .brand { grid-template-columns: minmax(0, 1fr) 104px !important; }
      .brand-logo { width: 104px !important; }
      #status { font-size: 11px !important; }
      .tab { min-height: 38px !important; padding: 0 12px !important; font-size: 13px !important; }
      .stats { grid-template-columns: 1fr !important; }
      .quick-grid { grid-template-columns: 1fr 1fr !important; }
      .toolbar { grid-template-columns: 1fr !important; }
      table.inventory-table { min-width: 680px !important; }
    }

    @media (min-width: 1100px) {
      body { padding-left: 260px !important; }
      header {
        position: fixed !important;
        left: 0 !important;
        top: 0 !important;
        bottom: 0 !important;
        width: 260px !important;

    const productCategoryLabel = (value) => productCategory(value) === "ANCHOR" ? "ANCHOR&etc" : productCategory(value);
    const warningQtyFromBase = (value) => {
      const qty = num(value);
      if (qty <= 1) return 0;
      return Math.max(1, Math.ceil(qty * 0.2));
    };
    const parseSeedProducts = () => seedProductsText.split("\n").map((line) => {
      const [category, name, company, subcategory, landingQty, warningStock] = line.split("\t");
      const baseQty = num(landingQty) || num(warningStock);
      return {
        category,
        name,
        company,
        subcategory,
        stock: baseQty,
        baseStock: baseQty,
        landingQty: num(landingQty),
        warningStock: warningQtyFromBase(baseQty)
      };
    });
    const productKey = (item) => [
      normalizedName(productCategory(item.category)),
      normalizedName(item.company),
      normalizedName(item.subcategory || item.type),
      normalizedName(item.name)
    ].join("::");
    const productLooseKey = (item) => [
      normalizedName(productCategory(item.category)),

    ].join("::");

    const mergeSeedList = (items, seedNames) => {
      const existing = new Set(items.map((item) => normalizedName(item.name)));
      const additions = seedNames
        .map((name) => name.trim())
        .filter((name) => name && !existing.has(normalizedName(name)))
        .map((name) => ({ id: uid(), name }));
      return additions.length ? { items: [...items, ...additions], added: additions.length } : { items, added: 0 };
    };

    const inferSurgeryDepartment = (name) => {
      const text = normalizedName(name);
      const osTerms = ["a/s", "shoulder", "knee", "ankle", "elbow", "orif", "debri", "repair", "recon", "tsra", "tara", "tkra", "uka", "thra", "bhr", "removal"];
      return osTerms.some((term) => text.includes(term)) ? "OS" : "NS";
    };

    const surgeryKey = (item) => `${normalizedName(item.department || inferSurgeryDepartment(item.name))}::${normalizedName(item.name)}`;

    const normalizeLegacyMasters = () => {
      state.doctors = state.doctors
        .map((item) => ({ ...item, name: String(item.name || "").trim().toUpperCase() }))
        .filter((item) => item.name && !defaultDepartmentOnlyNames.includes(item.name));

      const asChildNames = new Map([
        ["shoulder", "A/S Shoulder"],
        ["knee", "A/S Knee"],
        ["ankle", "A/S Ankle"],
        ["elbow", "A/S Elbow"]
      ]);
      state.surgeries = state.surgeries.map((item) => {
        const fixedName = asChildNames.get(normalizedName(item.name)) || item.name;
        return {
          ...item,
          name: fixedName,
          department: departmentCode(item.department) || inferSurgeryDepartment(fixedName)
        };
      });
      const seenSurgeries = new Set();
      state.surgeries = state.surgeries.filter((item) => {
        const key = surgeryKey(item);
        if (seenSurgeries.has(key)) return false;
        seenSurgeries.add(key);
        return true;
      });

      state.products = state.products.map((item) => {
        const category = productCategory(item.category);
        const landingQty = num(item.landingQty);
        const baseQty = num(item.stock) || landingQty || num(item.warningStock);
        return {
          ...item,
          category,
          company: category === "비급여" ? "" : String(item.company || "").trim(),
          subcategory: category === "ANCHOR" ? String(item.subcategory || item.type || "").trim() : "",
          landingQty,
          baseStock: item.baseStock,
          warningStock: num(item.warningStock) || warningQtyFromBase(baseQty)
        };
      });
      const seenProducts = new Set();
      state.products = state.products.filter((item) => {
        const key = productKey(item);
        if (seenProducts.has(key)) return false;
        seenProducts.add(key);
        return true;
      });
    };

    const addSeedMasters = () => {
      normalizeLegacyMasters();
      const doctors = mergeSeedList(state.doctors, seedDoctors);
      const existingSurgeries = new Set(state.surgeries.map(surgeryKey));
      const surgeryAdditions = seedSurgeries
        .filter((item) => !existingSurgeries.has(surgeryKey(item)))
        .map((item) => ({ id: uid(), ...item }));
      state.doctors = doctors.items;
      state.surgeries = [...state.surgeries, ...surgeryAdditions];
      const existingProducts = new Map(state.products.map((item) => [productKey(item), item]));
      const existingProductsLoose = new Map(state.products.map((item) => [productLooseKey(item), item]));
      let updatedProducts = 0;
      const productAdditions = [];
      parseSeedProducts().forEach((seed) => {
        const exact = existingProducts.get(productKey(seed));
        const loose = existingProductsLoose.get(productLooseKey(seed));
        if (exact || loose) {
          const target = exact || loose;
          if (!target) return;
          const next = {
            ...target,
            company: seed.company,
            subcategory: seed.subcategory,
            stock: target.stock,
            baseStock: Number.isFinite(Number(target.baseStock)) ? num(target.baseStock) : seed.baseStock,
            landingQty: num(target.landingQty) || seed.landingQty,
            warningStock: num(target.warningStock) || seed.warningStock
          };
          if (JSON.stringify(target) !== JSON.stringify(next)) {
            Object.assign(target, next);
            updatedProducts += 1;
          }
          return;
        }
        productAdditions.push({ id: uid(), ...seed });
      });
      state.products = [...state.products, ...productAdditions];
      return doctors.added + surgeryAdditions.length + productAdditions.length + updatedProducts;
    };

    const productMovementCounts = () => {
      const used = new Map();
      const received = new Map();
      state.usages.forEach((usage) => {
        (usage.productIds || []).forEach((id) => used.set(id, (used.get(id) || 0) + 1));
      });
      state.receipts.forEach((receipt) => {
        received.set(receipt.productId, (received.get(receipt.productId) || 0) + num(receipt.qty));
      });
      return { used, received };
    };

    const reconcileProductStocks = () => {
      const { used, received } = productMovementCounts();
      const seedByKey = new Map(parseSeedProducts().map((item) => [productKey(item), item]));
      const seedByLooseKey = new Map(parseSeedProducts().map((item) => [productLooseKey(item), item]));
      let changed = 0;
      state.products = state.products.map((product) => {
        const seed = seedByKey.get(productKey(product)) || seedByLooseKey.get(productLooseKey(product));
        const productUsed = used.get(product.id) || 0;
        const productReceived = received.get(product.id) || 0;
        const baseStock = Number.isFinite(Number(product.baseStock))
          ? num(product.baseStock)
          : seed
            ? num(seed.baseStock)
            : num(product.stock) - productReceived + productUsed;
        const next = {
          ...product,
          baseStock,
          stock: Math.max(0, baseStock + productReceived - productUsed)
        };
        if (num(product.baseStock) !== num(next.baseStock) || num(product.stock) !== num(next.stock)) changed += 1;
        return next;
      });
      return changed;
    };



    const itemTimestamp = (item, fallback = "") => String(item?.updatedAt || item?.createdAt || fallback || "");

    const mergeArrayById = (remoteItems = [], localItems = [], fallbackRemote = "", fallbackLocal = "") => {
      const merged = new Map();
      remoteItems.forEach((item) => {
        if (!item?.id) return;
        merged.set(item.id, item);
      });
      localItems.forEach((item) => {
        if (!item?.id) return;
        const current = merged.get(item.id);
        if (!current) {
          merged.set(item.id, item);
          return;
        }
        const localTime = itemTimestamp(item, fallbackLocal);
        const remoteTime = itemTimestamp(current, fallbackRemote);
        if (localTime >= remoteTime) merged.set(item.id, { ...current, ...item });
      });
      return Array.from(merged.values());
    };

    const mergeStates = (remoteData, localData) => {
      const remote = normalizeState(remoteData || {});
      const local = normalizeState(localData || {});
      const merged = normalizeState({
        ...remote,
        updatedAt: new Date().toISOString(),
        products: mergeArrayById(remote.products, local.products, remote.updatedAt, local.updatedAt),
        doctors: mergeArrayById(remote.doctors, local.doctors, remote.updatedAt, local.updatedAt),
        surgeries: mergeArrayById(remote.surgeries, local.surgeries, remote.updatedAt, local.updatedAt),
        receipts: mergeArrayById(remote.receipts, local.receipts, remote.updatedAt, local.updatedAt),
        usages: mergeArrayById(remote.usages, local.usages, remote.updatedAt, local.updatedAt),
        usageRules: mergeArrayById(remote.usageRules, local.usageRules, remote.updatedAt, local.updatedAt),
        backupVersions: mergeArrayById(remote.backupVersions || [], local.backupVersions || [], remote.updatedAt, local.updatedAt),
        hiddenLowProductIds: [...new Set([...(remote.hiddenLowProductIds || []), ...(local.hiddenLowProductIds || [])])]
      });
      const before = state;
      state = merged;
      reconcileProductStocks();
      const reconciled = normalizeState(state);
      state = before;
      return reconciled;
    };

    const saveState = async (message = "저장 완료", options = {}) => {

      try {

          const merged = await runTransaction(db, async (transaction) => {
            if (options.authoritative) {
              const nextState = normalizeState(state);
              transaction.set(ref, nextState);
              return nextState;
            }
            const serverSnap = await transaction.get(ref);
            const remoteData = serverSnap.exists() ? serverSnap.data() : blankState();
            const nextState = mergeStates(remoteData, state);
            transaction.set(ref, nextState);
            return nextState;
          });
          state = normalizeState(merged);
        } else {
          reconcileProductStocks();
          await setDoc(ref, state);
        }
        setStatus(`${message} · 동시저장 보호`, "ok");
      } catch (error) {

    const renderDashboard = () => {
      const lowProducts = state.products
        .filter((item) => num(item.stock) <= num(item.warningStock))
        .sort((a, b) => num(a.stock) - num(b.stock) || alphaFirstCompare(a.name, b.name));
      const hiddenLowIds = new Set(state.hiddenLowProductIds || []);
      const visibleLowProducts = lowProducts.filter((item) => !hiddenLowIds.has(item.id));
      const hiddenLowProducts = lowProducts.filter((item) => hiddenLowIds.has(item.id));

      const todayText = today();
      const todayDate = new Date(`${todayText}T00:00:00`);
      const dateDistance = (dateText) => {
        const date = new Date(`${dateText || ""}T00:00:00`);
        if (Number.isNaN(date.getTime())) return 9999;
        return Math.floor((todayDate - date) / 86400000);
      };

      const todayUsages = state.usages.filter((item) => item.date === todayText);
      const recentUsages = state.usages.filter((item) => {
        const distance = dateDistance(item.date);
        return distance >= 0 && distance <= 6;
      });
      const todayProductCount = todayUsages.reduce((sum, item) => sum + (item.productIds || []).length, 0);
      const pendingLandingLines = landingUsageLines(false);
      const totalStock = state.products.reduce((sum, item) => sum + num(item.stock), 0);

      const todayCategoryCounts = ["비급여", "인체조직", "ANCHOR"].map((category) => ({
        category,
        count: todayUsages.reduce((sum, usage) => sum + (usage.productIds || []).filter((id) => productCategory(productById(id)?.category) === category).length, 0)
      }));

      const productUseMap = new Map();
      recentUsages.forEach((usage) => {

      const todayUsageBrief = todayUsages.slice().reverse().slice(0, 5);

                ${hiddenLowProducts.length ? `<details class="item"><summary><span>감춰진 경고 재고</span><span class="pill">${hiddenLowProducts.length}</span></summary><div class="details-body">${hiddenLowProducts.map((item) => lowProductItem(item, true)).join("")}</div></details>` : ""}

    const productItem = (item) => {

      const detail = [
        `분류: ${escapeHtml(productCategoryLabel(item.category))}`,

    const lowProductItem = (item, hidden = false) => {
      const shortage = Math.max(0, num(item.warningStock) - num(item.stock));
      const reason = num(item.stock) <= num(item.warningStock)
        ? `현재고 ${num(item.stock)}개가 경고수량 ${num(item.warningStock)}개 이하입니다.${shortage ? ` ${shortage}개 더 있어야 경고에서 벗어납니다.` : ""}`
        : "";
      return `
        <div class="item">
          <div class="item-title">
            <span>${escapeHtml(item.name)}</span>
            <span class="pill low">경고</span>
          </div>
          <div class="meta">
            <span>분류: ${escapeHtml(productCategoryLabel(item.category))}${item.company ? ` · 업체: ${escapeHtml(item.company)}` : ""}${item.subcategory ? ` · 세부: ${escapeHtml(item.subcategory)}` : ""}</span>
            <span>현재고: ${num(item.stock)} · 경고수량: ${num(item.warningStock)}${item.category === "비급여" ? "" : ` · 랜딩수량: ${num(item.landingQty)}`}</span>
            <span>${escapeHtml(reason)}</span>
          </div>
          <div class="actions">
            <button class="secondary" type="button" data-${hidden ? "show" : "hide"}-low-product="${item.id}">${hidden ? "다시 보이기" : "감추기"}</button>
          </div>
        </div>
      `;
    };

    const renderGroupedProducts = (withActions) => {
      if (!state.products.length) return `<div class="empty">제품을 추가해 주세요.</div>`;
      const categories = ["비급여", "인체조직", "ANCHOR"];
      return categories.map((category) => {
        const categoryItems = state.products.filter((item) => productCategory(item.category) === category).sort(byName);
        if (!categoryItems.length) return "";
        if (category === "비급여") {
          return `
            <details class="item">
              <summary><span>비급여</span><span class="pill">${categoryItems.length}</span></summary>
              <div class="details-body">
                ${categoryItems.map((item) => withActions ? productItem(item) : productCheckItem(item)).join("")}
              </div>
            </details>
          `;
        }
        const companies = [...new Set(categoryItems.map((item) => item.company || "업체 없음"))].sort(alphaFirstCompare);
        return `
          <details class="item">
            <summary><span>${escapeHtml(productCategoryLabel(category))}</span><span class="pill">${categoryItems.length}</span></summary>
            <div class="details-body">
              ${companies.map((company) => renderProductCompanyGroup(categoryItems, company, category, withActions)).join("")}
            </div>
          </details>
        `;
      }).join("");
    };

    const renderProductCompanyGroup = (items, company, category, withActions) => {
      const companyItems = items.filter((item) => (item.company || "업체 없음") === company).sort(byName);
      if (category !== "ANCHOR") {
        return `
          <details class="item">
            <summary><span>${escapeHtml(company)}</span><span class="pill">${companyItems.length}</span></summary>
            <div class="details-body">
              ${companyItems.map((item) => withActions ? productItem(item) : productCheckItem(item)).join("")}
            </div>
          </details>
        `;
      }
      const subcategories = [...new Set(companyItems.map((item) => item.subcategory || "분류 없음"))].sort(alphaFirstCompare);
      return `
        <details class="item">
          <summary><span>${escapeHtml(company)}</span><span class="pill">${companyItems.length}</span></summary>
          <div class="details-body">
            ${subcategories.map((subcategory) => {
              const subItems = companyItems.filter((item) => (item.subcategory || "분류 없음") === subcategory).sort(byName);
              return `
                <details class="item">
                  <summary><span>${escapeHtml(subcategory)}</span><span class="pill">${subItems.length}</span></summary>
                  <div class="details-body">
                    ${subItems.map((item) => withActions ? productItem(item) : productCheckItem(item)).join("")}
                  </div>
                </details>
              `;
            }).join("")}
          </div>
        </details>
      `;
    };


    const qtyStepper = (inputAttrs, value, max = 999) => `
      <div class="qty-stepper">
        <button type="button" onclick="event.preventDefault();event.stopPropagation();adjustQtyButton(this,-1)" aria-label="수량 줄이기">−</button>
        <input type="number" min="1" max="${Math.max(1, num(max))}" value="${Math.max(1, num(value))}" ${inputAttrs} readonly>
        <button type="button" onclick="event.preventDefault();event.stopPropagation();adjustQtyButton(this,1)" aria-label="수량 늘리기">+</button>
      </div>
    `;

    window.adjustQtyButton = (button, delta) => {
      const wrap = button.closest('.qty-stepper');
      const input = wrap?.querySelector('input');
      if (!input) return;
      const min = Math.max(1, num(input.min || 1));
      const max = Math.max(min, num(input.max || 9999));
      const next = Math.min(max, Math.max(min, num(input.value || 1) + delta));
      input.value = next;
      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
    };

    const productCheckItem = (item) => `
      <label class="check-card use-card">
        <input type="checkbox" value="${item.id}" data-use-product="${item.id}" ${num(item.stock) < 1 ? "disabled" : ""}>
        <span>${escapeHtml(item.name)}<br><span class="muted">${escapeHtml(item.company || item.category)}${item.subcategory ? ` · ${escapeHtml(item.subcategory)}` : ""}</span></span>
        ${qtyStepper(`data-use-qty="${item.id}" aria-label="${escapeHtml(item.name)} 사용 수량"`, 1, Math.max(1, num(item.stock)))}
      </label>
    `;

    let syncProductFields = null;
    let filterRuleOptions = null;

    const bindProducts = () => {
      const form = document.getElementById("productForm");
      syncProductFields = () => {
        const category = document.getElementById("productCategory").value;
        document.getElementById("productCompanyWrap").style.display = category === "비급여" ? "none" : "block";
        document.getElementById("productSubcategoryWrap").style.display = category === "ANCHOR" ? "block" : "none";
        document.getElementById("productLandingWrap").style.display = category === "비급여" ? "none" : "block";
        if (category === "비급여") {
          document.getElementById("productCompany").value = "";
          document.getElementById("productSubcategory").value = "";
          document.getElementById("productLanding").value = "0";
        }
      };
      document.getElementById("productCategory").addEventListener("change", syncProductFields);
      document.getElementById("productReset").addEventListener("click", () => {
        form.reset();
        document.getElementById("productId").value = "";
        document.getElementById("productFormTitle").textContent = "제품 추가";
        syncProductFields();
      });
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const id = document.getElementById("productId").value || uid();
        const next = {
          id,
          category: document.getElementById("productCategory").value,
          name: document.getElementById("productName").value.trim(),
          company: document.getElementById("productCategory").value === "비급여" ? "" : document.getElementById("productCompany").value.trim(),
          subcategory: document.getElementById("productCategory").value === "ANCHOR" ? document.getElementById("productSubcategory").value : "",
          stock: num(document.getElementById("productStock").value),
          warningStock: num(document.getElementById("productWarning").value),
          landingQty: document.getElementById("productCategory").value === "비급여" ? 0 : num(document.getElementById("productLanding").value)
        };
        if (!next.name) return;
        const { used, received } = productMovementCounts();
        next.baseStock = num(next.stock) - (received.get(id) || 0) + (used.get(id) || 0);
        state.products = [...state.products.filter((item) => item.id !== id), next];
        reconcileProductStocks();
        render();
        await saveState();
      });
      syncProductFields();
    };

    const renderDoctors = () => renderSimpleManager("doctors", "과", "doctor");

    const renderSurgeries = () => `
      <section class="grid two">
        <form class="card" id="surgeryForm">
          <h2 id="surgeryFormTitle">수술 추가</h2>
          <input type="hidden" id="surgeryId">

    const renderSimpleManager = (collection, label, key) => `
      <section class="grid two">
        <form class="card" id="${key}Form">
          <h2 id="${key}FormTitle">${label} 추가</h2>
          <input type="hidden" id="${key}Id">

        </form>
        <div class="card">
          <h2>${label} 목록</h2>
          ${key === "doctor" ? renderGroupedDoctors() : state[collection].slice().sort(byName).map((item) => `
            <div class="item">

              <div class="actions">

    const departmentPriority = (name) => {
      if (name === "NS") return 0;
      if (name === "OS") return 1;
      return 2;
    };

    const departmentCompare = (left, right) => departmentPriority(left) - departmentPriority(right) || alphaFirstCompare(left, right);

    const departmentNames = () => [...new Set(state.doctors.map((item) => departmentCode(item.name)).filter(Boolean))]
      .sort(departmentCompare);

    const departmentOptions = (selected = "") => departmentNames()
      .map((name) => `<option value="${escapeHtml(name)}" ${name === selected ? "selected" : ""}>${escapeHtml(name)}</option>`)
      .join("");

    const renderGroupedDoctors = () => {
      if (!state.doctors.length) return `<div class="empty">과를 추가해 주세요.</div>`;
      return departmentNames().map((department) => {
        const items = state.doctors
          .filter((item) => departmentCode(item.name) === department)
          .sort(byName);
        return `
          <details class="item">
            <summary><span>${escapeHtml(department)}</span><span class="pill">${items.length}</span></summary>
            <div class="details-body">
            ${items.map((item) => `
              <div class="item">
                <div class="item-title"><span>${escapeHtml(item.name)}</span></div>
                <div class="actions">

            `).join("")}
            </div>
          </details>
        `;
      }).join("");
    };

    const landingReceiptKey = (usageId, productId) => `${usageId}::${productId}`;

    const landingReceiptByLine = () => {
      const map = new Map();
      state.receipts
        .filter((item) => item.type === "landing")
        .forEach((item) => map.set(landingReceiptKey(item.usageId, item.productId), item));
      return map;
    };

    const landingUsageLines = (includeReceived = true) => {
      const received = landingReceiptByLine();
      return state.usages.flatMap((usage) => {
        const counts = (usage.productIds || []).reduce((map, productId) => {
          map.set(productId, (map.get(productId) || 0) + 1);
          return map;
        }, new Map());
        return Array.from(counts.entries()).map(([productId, qty]) => {
        const product = productById(productId);
        if (!product || productCategory(product.category) === "비급여") return null;
        const receipt = received.get(landingReceiptKey(usage.id, productId));
        if (!includeReceived && receipt) return null;
        return { usage, product, receipt, qty };
      });

    const usageProductItems = (usage) => Array.from((usage?.productIds || []).reduce((map, id) => {
      map.set(id, (map.get(id) || 0) + 1);
      return map;
    }, new Map()).entries()).map(([productId, qty]) => ({ productId, qty }));

    const renderUseItemsList = (items, target) => {
      if (!items.length) {
        target.innerHTML = `<span>선택된 제품이 없습니다.</span>`;
        return;
      }
      const chipClass = (category) => {
        const key = productCategory(category);
        if (key === "비급여") return "nonpay";
        if (key === "인체조직") return "tissue";
        if (key === "ANCHOR") return "anchor";
        return "";
      };
      const safeItems = items
        .map((item) => ({ ...item, product: productById(item.productId) }))
        .filter((item) => item.product && num(item.qty) > 0);
      if (!safeItems.length) {
        target.innerHTML = `<span>선택된 제품이 없습니다.</span>`;
        return;
      }
      target.innerHTML = `
        <div class="selected-use-buttons">
          ${safeItems.map((item) => {
            const product = item.product;
            const linkedQty = app.querySelector(`[data-use-qty="${item.productId}"]`);
            const maxQty = Math.max(1, num(linkedQty?.max || product.stock || 999));
            const meta = [productCategoryLabel(product.category), product.company, product.subcategory].filter(Boolean).join(" · ");
            return `
              <div class="selected-use-chip ${chipClass(product.category)}">
                <div class="selected-use-name" title="${escapeHtml(product.name)}">
                  ${escapeHtml(product.name)}<span>${escapeHtml(meta)}</span>
                </div>
                <div class="selected-use-controls">
                  <button type="button" class="secondary" data-edit-selected-dec="${item.productId}" aria-label="수량 줄이기">−</button>
                  <input type="number" min="0" max="${maxQty}" value="${Math.max(1, num(item.qty))}" data-edit-selected-qty="${item.productId}" aria-label="${escapeHtml(product.name)} 수량" readonly>
                  <button type="button" class="secondary" data-edit-selected-inc="${item.productId}" aria-label="수량 늘리기">+</button>
                  <button type="button" class="remove-selected" data-edit-selected-remove="${item.productId}">삭제</button>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
      const syncProductQty = (productId, nextQty) => {
        const scope = target.closest("form") || app;
        const checkbox = scope.querySelector(`[data-use-product="${productId}"]`);
        const qtyInput = scope.querySelector(`[data-use-qty="${productId}"]`);
        const maxQty = Math.max(1, num(qtyInput?.max || 999));
        const safeQty = Math.min(maxQty, Math.max(0, num(nextQty)));
        if (safeQty <= 0) {
          if (checkbox) checkbox.checked = false;
          if (qtyInput) qtyInput.value = 1;
        } else {
          if (checkbox) checkbox.checked = true;
          if (qtyInput) qtyInput.value = safeQty;
        }
        renderUseItemsList(Array.from(scope.querySelectorAll("[data-use-product]:checked")).map((input) => ({
          productId: input.value,
          qty: Math.max(1, num(scope.querySelector(`[data-use-qty="${input.value}"]`)?.value))
        })), target);
      };
      target.querySelectorAll("[data-edit-selected-remove]").forEach((button) => {
        button.addEventListener("click", () => syncProductQty(button.dataset.editSelectedRemove, 0));
      });
      target.querySelectorAll("[data-edit-selected-dec], [data-edit-selected-inc]").forEach((button) => {
        button.addEventListener("click", () => {
          const productId = button.dataset.editSelectedDec || button.dataset.editSelectedInc;
          const linked = app.querySelector(`[data-use-qty="${productId}"]`);
          const currentQty = Math.max(1, num(linked?.value || 1));
          const nextQty = button.dataset.editSelectedDec ? currentQty - 1 : currentQty + 1;
          syncProductQty(productId, nextQty);
        });
      });
    };

    const bindEditUsage = () => {
      const select = document.getElementById("editUsageSelect");
      const form = document.getElementById("editUsageForm");
      const useDepartment = document.getElementById("editDepartment");
      const doctorSelect = document.getElementById("editDoctor");
      const surgerySelect = document.getElementById("editSurgery");
      const selectedList = document.getElementById("editSelectedUseList");
      const productSearch = document.getElementById("editProductSearch");
      const productSearchResults = document.getElementById("editProductSearchResults");
      const selectedItems = () => Array.from(form.querySelectorAll("[data-use-product]:checked")).map((input) => ({
        productId: input.value,
        qty: Math.max(1, num(form.querySelector(`[data-use-qty="${input.value}"]`)?.value))
      }));
      const renderSelected = () => renderUseItemsList(selectedItems(), selectedList);
      const selectProduct = (productId, qty = 1) => {
        const checkbox = form.querySelector(`[data-use-product="${productId}"]`);
        const qtyInput = form.querySelector(`[data-use-qty="${productId}"]`);
        if (checkbox) checkbox.checked = true;
        if (qtyInput) qtyInput.value = Math.max(1, num(qty));
        renderSelected();
      };
      const clearProducts = () => {
        form.querySelectorAll("[data-use-product]").forEach((input) => {
          input.checked = false;
          input.disabled = false;
        });
        form.querySelectorAll("[data-use-qty]").forEach((input) => {
          input.value = 1;
          input.disabled = false;
        });
      };
      const syncEditStockLimits = (usage) => {
        const originalCounts = usageProductItems(usage).reduce((map, item) => {
          map.set(item.productId, item.qty);
          return map;
        }, new Map());
        form.querySelectorAll("[data-use-product]").forEach((input) => {
          const product = productById(input.value);
          const available = num(product?.stock) + (originalCounts.get(input.value) || 0);
          const qtyInput = form.querySelector(`[data-use-qty="${input.value}"]`);
          input.disabled = false;
          if (qtyInput) {
            qtyInput.disabled = false;
            qtyInput.max = Math.max(1, available);
          }
        });
      };
      const filterOptions = () => {
        const department = useDepartment.value;
        const currentDoctor = doctorSelect.value;
        const currentSurgery = surgerySelect.value;
        const doctors = department
          ? state.doctors.slice().sort(byName).filter((item) => departmentCode(item.name) === department)
          : [];
        doctorSelect.innerHTML = `<option value="">${department ? "원장 코드 선택" : "과를 먼저 선택하세요"}</option>` + doctors
          .map((item) => `<option value="${item.id}">${escapeHtml(item.name)}</option>`)
          .join("");
        if (doctors.some((item) => item.id === currentDoctor)) doctorSelect.value = currentDoctor;
        const surgeries = department && doctorSelect.value
          ? state.surgeries.slice().sort((a, b) => alphaFirstCompare(a.name, b.name)).filter((item) => (item.department || inferSurgeryDepartment(item.name)) === department)
          : [];
        surgerySelect.innerHTML = `<option value="">${department && doctorSelect.value ? "수술 선택" : "원장 코드를 먼저 선택하세요"}</option>` + surgeries
          .map((item) => `<option value="${item.id}">${escapeHtml(item.department || inferSurgeryDepartment(item.name))} - ${escapeHtml(item.name)}</option>`)
          .join("");
        if (surgeries.some((item) => item.id === currentSurgery)) surgerySelect.value = currentSurgery;
      };
      const renderSearch = () => {
        const query = normalizedName(productSearch.value);
        if (!query) {
          productSearchResults.innerHTML = `<div class="empty">제품명을 입력해 주세요.</div>`;
          return;
        }
        const results = state.products
          .filter((item) => normalizedName(`${item.name} ${item.company || ""} ${item.subcategory || ""} ${productCategoryLabel(item.category)}`).includes(query))
          .sort(byName)
          .slice(0, 12);
        productSearchResults.innerHTML = results.length ? results.map((item) => `
          <label class="check-card use-card">
            <input type="checkbox" value="${item.id}" data-edit-search-product="${item.id}" ${form.querySelector(`[data-use-product="${item.id}"]`)?.checked ? "checked" : ""}>
            <span>${escapeHtml(item.name)}<br><span class="muted">${escapeHtml(productCategoryLabel(item.category))}${item.company ? ` · ${escapeHtml(item.company)}` : ""}${item.subcategory ? ` · ${escapeHtml(item.subcategory)}` : ""} · 현재고 ${num(item.stock)}</span></span>
            ${qtyStepper(`data-edit-search-qty="${item.id}" aria-label="${escapeHtml(item.name)} 수정 수량"`, Math.max(1, num(form.querySelector(`[data-use-qty="${item.id}"]`)?.value) || 1), Math.max(1, num(item.stock) || 999))}
          </label>
        `).join("") : `<div class="empty">검색 결과가 없습니다.</div>`;
        productSearchResults.querySelectorAll("[data-edit-search-product]").forEach((input) => {
          input.addEventListener("change", () => {
            const qty = productSearchResults.querySelector(`[data-edit-search-qty="${input.value}"]`)?.value;
            const linked = form.querySelector(`[data-use-product="${input.value}"]`);
            if (input.checked) {
              selectProduct(input.value, qty);
            } else if (linked) {
              linked.checked = false;
              renderSelected();
            }
          });
        });
        productSearchResults.querySelectorAll("[data-edit-search-qty]").forEach((input) => {
          input.addEventListener("input", () => selectProduct(input.dataset.editSearchQty, input.value));
        });
      };
      const loadUsage = (id) => {
        const usage = state.usages.find((item) => item.id === id);
        if (!usage) {
          form.style.display = "none";
          return;
        }
        form.style.display = "";
        form.querySelectorAll("input, select, textarea, button").forEach((element) => {
          element.disabled = false;
        });
        syncEditStockLimits(usage);
        document.getElementById("editUsageId").value = usage.id;
        document.getElementById("editPatientName").value = usage.patientName || "";
        document.getElementById("editUsageDate").value = usage.date || today();
        const surgery = surgeryById(usage.surgeryId);
        useDepartment.value = surgery?.department || inferSurgeryDepartment(surgery?.name || "") || departmentCode(departmentById(usage.doctorId)?.name || "");
        filterOptions();
        doctorSelect.value = usage.doctorId || "";
        filterOptions();
        surgerySelect.value = usage.surgeryId || "";
        if (usage.surgeryId && !surgerySelect.value) {
          const surgeryOption = surgeryById(usage.surgeryId);
          if (surgeryOption) {
            const fallbackOption = document.createElement("option");
            fallbackOption.value = surgeryOption.id;
            fallbackOption.textContent = `${surgeryOption.department || inferSurgeryDepartment(surgeryOption.name || "")} - ${surgeryOption.name}`;
            surgerySelect.appendChild(fallbackOption);
            surgerySelect.value = usage.surgeryId;
          }
        }
        clearProducts();
        usageProductItems(usage).forEach((item) => selectProduct(item.productId, item.qty));
        renderSearch();
        renderSelected();
      };
      select.addEventListener("change", () => loadUsage(select.value));
      useDepartment.addEventListener("change", filterOptions);
      form.querySelectorAll("[data-use-product], [data-use-qty]").forEach((input) => {
        input.addEventListener("change", () => {
          renderSelected();
          renderSearch();
        });
        input.addEventListener("input", () => {
          renderSelected();
          renderSearch();
        });
      });
      productSearch.addEventListener("input", renderSearch);
      document.getElementById("editUsageCancel").addEventListener("click", () => {
        select.value = "";
        form.style.display = "none";
        pendingEditUsageId = "";
      });
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const id = document.getElementById("editUsageId").value;
        const usage = state.usages.find((item) => item.id === id);
        if (!usage) return;
        const newItems = selectedItems();
        const newProductIds = newItems.flatMap((item) => Array.from({ length: item.qty }, () => item.productId));
        if (!document.getElementById("editPatientName").value.trim() || !doctorSelect.value || !surgerySelect.value) {
          alert("환자명, 원장 코드, 수술을 모두 입력해 주세요.");
          return;
        }
        if (!newProductIds.length) {
          alert("제품을 하나 이상 선택해 주세요.");
          return;
        }
        usage.productIds.forEach((productId) => {
          const product = productById(productId);
          if (product) product.stock = num(product.stock) + 1;
        });
        const unavailable = newItems.find((item) => num(productById(item.productId)?.stock) < item.qty);
        if (unavailable) {
          usage.productIds.forEach((productId) => {
            const product = productById(productId);
            if (product) product.stock = Math.max(0, num(product.stock) - 1);
          });
          alert("재고가 부족한 제품이 있습니다.");
          return;
        }
        const hasLandingReceipt = state.receipts.some((receipt) => receipt.type === "landing" && receipt.usageId === usage.id);
        if (hasLandingReceipt && !confirm("이미 랜딩 입고 확인된 사용내역입니다. 입고내역은 보존됩니다. 그래도 수정할까요?")) {
          usage.productIds.forEach((productId) => {
            const product = productById(productId);
            if (product) product.stock = Math.max(0, num(product.stock) - 1);
          });
          return;
        }
        newItems.forEach((item) => {
          const product = productById(item.productId);
          if (product) product.stock = Math.max(0, num(product.stock) - item.qty);
        });
        const next = {
          ...usage,
          patientName: document.getElementById("editPatientName").value.trim(),
          doctorId: doctorSelect.value,
          surgeryId: surgerySelect.value,
          productIds: newProductIds,
          date: document.getElementById("editUsageDate").value,
          updatedAt: new Date().toISOString()
        };
        state.usages = state.usages.map((item) => item.id === usage.id ? next : item);
        currentView = "dashboard";
        pendingEditUsageId = "";
        await saveState("수정 완료");
        render();
      });
      filterOptions();
      renderSearch();
      if (pendingEditUsageId) {
        select.value = pendingEditUsageId;
        loadUsage(pendingEditUsageId);
      }
    };
